<!-- NOTES BOX -->
<rect x="60" y="478" width="560" height="68" rx="8" fill="none" stroke="#1F1E1D26" stroke-width="0.8"/>
<text x="80" y="498" fill="#141413" font-family="sans-serif" font-size="14" font-weight="500">Notes</text>
<text x="80" y="516" fill="#3D3D3A" font-family="sans-serif" font-size="12">• The toolhead advances a few mm in Y to position the nozzle over the belt — no extra X movement needed</text>
<text x="80" y="532" fill="#3D3D3A" font-family="sans-serif" font-size="12">• The belt rotates slowly, conveying purged material into the waste bin (left side, left roller)</text>
<text x="80" y="548" fill="#3D3D3A" font-family="sans-serif" font-size="12">• The Z gap nozzle/belt (~0.5mm) is managed via the bed Z position at purge time</text>

